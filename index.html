<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Kitchen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,700;1,700&family=DM+Mono:wght@400;500;700&family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ember: #D94F00;
      --gold: #E8A020;
      --jade: #2D7A4F;
      --deep: #0C0804;
      --panel: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.08);
      --bright: #FFF3E0;
      --dim: rgba(255,243,224,0.50);
      --dimmer: rgba(255,243,224,0.28);
      --bg: #0B0804;
      --text: #F9F1E4;
      --shadow: 0 14px 40px rgba(0,0,0,0.46);
      --radius: 14px;
      --transition: 220ms ease;
    }

    * { box-sizing: border-box; }
    body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #050302; color: var(--text); font-family: 'Outfit', sans-serif; }

    #app { display: grid; grid-template-columns: 260px 1fr; height: 100vh; width: 100vw; }

    .sidebar { background: #080502; border-right: 1px solid var(--border); padding: 1rem 0.9rem; display: flex; flex-direction: column; }
    .brand { font-family: 'Cormorant Garamond', serif; font-size: 1.45rem; margin-bottom: 1.1rem; color: var(--bright); letter-spacing: .02em; }
    .brand span { font-size: .85rem; color: var(--dim); display: block; margin-top: .2rem; }
    .category { cursor: pointer; display: flex; align-items: center; justify-content: space-between; padding: .5rem .35rem; border-radius: 9px; margin-bottom: 0.2rem; transition: all .2s ease; color: var(--dim); }
    .category:hover { background: rgba(255,255,255,0.08); color: var(--bright); }
    .category.active { color: var(--bright); }
    .category .caption { display:flex; gap: .45rem; align-items: baseline; }
    .recipe-list { margin-left: 1.2rem; max-height: 220px; overflow: hidden; transition:max-height .3s; }
    .recipe-item { display: block; padding: .25rem .4rem; margin: .15rem 0; border-left: 3px solid transparent; color: var(--dim); cursor: pointer; border-radius: 4px; transition: all .2s ease; }
    .recipe-item:hover { color: var(--bright); background: rgba(255,255,255,.05); }
    .recipe-item.active { color: var(--ember); border-left-color: var(--ember); font-weight: 700; }
    .serves-control { margin-top: auto; padding-top: 1rem; border-top: 1px solid var(--border); }
    .serves-control h3 { font-family: 'DM Mono', monospace; letter-spacing:.13em; text-transform: uppercase; color: var(--dimmer); margin: 0 0 .5rem; font-size: .78rem; }
    .serves-row { display:flex; align-items:center; justify-content: space-between; gap:.5rem; }
    .serves-row button { width: 2.2rem; height: 2.2rem; border-radius: 10px; border:1px solid var(--border); color: var(--bright); background: rgba(255,255,255,0.05); cursor: pointer; font-size: 1.2rem; }
    .serves-row .serves-value { width: 60px; text-align:center; font-family: 'Cormorant Garamond', serif; font-size: 1.45rem; color: var(--bright); }
    .serves-note { margin-top: .4rem; color: var(--dimmer); font-size: .82rem; }

    .main { position:relative; background: radial-gradient(circle at 20% 30%, rgba(233,131,55,.18) 0%, rgba(5,3,1,.96) 55%); overflow:hidden; }
    .topbar { position:absolute; top:1rem; left:1.4rem; right:1.4rem; z-index:15; display:flex; justify-content:space-between; align-items:center; gap:.9rem; padding:.6rem .9rem; background: rgba(7,5,2,0.45); border:1px solid var(--border); border-radius: 18px; backdrop-filter: blur(11px); box-shadow: var(--shadow); }
    .topbar h1 { margin:0; font-family:'Cormorant Garamond', serif; font-size:1.26rem; color: var(--bright); }
    .topbar button { border:none; color: var(--bright); background: rgba(255,255,255,0.07); border:1px solid var(--border); border-radius: 10px; padding:.45rem .75rem; cursor:pointer; font-family:'DM Mono', monospace; letter-spacing:0.03em; }

    .welcome { width:100%; height:100%; display:flex; align-items:center; justify-content:center; flex-direction:column; text-align:center; position: relative; padding: 2rem; }
    .welcome h1 { font-family:'Cormorant Garamond', serif; font-size: 7.5rem; font-style: italic; margin:.2rem 0; line-height:1; background: linear-gradient(90deg, var(--ember), var(--gold), var(--bright)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .welcome p { color: var(--dimmer); font-size:1.1rem; margin:.4rem 0 1.5rem; }
    .cat-grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(140px,1fr)); gap:.7rem; width:100%; max-width: 850px; }
    .cat-button { border:1px solid var(--border); background: var(--panel); color: var(--bright); padding:.9rem .7rem; border-radius: 10px; cursor:pointer; font-family:'DM Mono', monospace; font-size:.86rem; transition: .2s; text-align:left; }
    .cat-button:hover { border-color: var(--gold); background: rgba(232,160,32,0.15); }

    .slide-container { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; text-align:center; overflow:hidden; }
    .slide-bg { position:absolute; inset:0; background-size:cover; background-position:center; transform:scale(1); transition: transform 12s linear; }
    .slide-bg::after { content:''; position:absolute; inset:0; background: rgba(0,0,0,0.62); }
    .slide-bg.kenburns { animation: kenburns 22s ease-out infinite; }

    @keyframes kenburns { 0% { transform:scale(1); } 100% { transform:scale(1.07); } }

    .slide-content { position:relative; z-index: 8; max-width: 920px; width:100%; padding:2.5rem; color: #FFF7E2; text-shadow: 0 1px 18px rgba(0,0,0,.6); }
    .slide-content h2 { font-family:'DM Mono', monospace; color: var(--gold); margin:0 0 .5rem; font-size: 1rem; text-transform: uppercase; letter-spacing:.15em; }
    .slide-content h3 { margin:.35rem 0 .9rem; font-family:'Cormorant Garamond', serif; font-size: 3.4rem; line-height:1.1; text-transform: none; }
    .slide-content h3 em { color: var(--gold); font-style: italic; }
    .slide-content p.subtitle { margin:0 0 1rem; font-size:1.2rem; color: var(--dim); }
    .stats, .step-meta, .ingredients-grid, .tip-grid, .serving-grid { display:flex; flex-wrap: wrap; gap: .7rem; justify-content:center; margin-top:1rem; }
    .badge { background: rgba(255,255,255,0.08); border: 1px solid var(--border); border-radius: 999px; padding:.55rem .8rem; font-family:'DM Mono', monospace; font-size:.82rem; color: var(--bright); }
    .step-phase { background: rgba(45,122,79,0.23); color: #B9F4BB; border:1px solid rgba(45,122,79,.4); }
    .step-badge { width: 44px; height: 44px; border-radius:50%; background: var(--ember); color:#080502; display:flex; align-items:center; justify-content:center; font-weight: 700; }
    .step-title { font-family: 'Cormorant Garamond', serif; font-size: 2.35rem; margin: .5rem 0 .4rem; }
    .step-body { font-weight:300; line-height:1.78; font-size:1.1rem; color: #FFE6C7; max-width: 900px; margin:0 auto; }
    .step-body strong, .ingredients-grid strong { color: var(--gold); }
    .timer-pill { display:inline-block; margin-top: 1rem; border-radius: 999px; background: rgba(217,79,0,0.18); border:1px solid rgba(217,79,0,.55); color:#FFF3E0; padding:.35rem .75rem; font-family:'DM Mono', monospace; }
    .tip-box { margin-top:1rem; padding:1rem; border-left: 4px solid var(--gold); background: rgba(232,160,32,0.11); border-radius: 10px; text-align:left; max-width: 860px; margin-left:auto; margin-right:auto; }
    .tip-box p { margin:0; font-size:.95rem; }

    .ingredients-grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(225px,1fr)); gap:1rem; margin-top:1.2rem; text-align:left; }
    .ingredient-group { background: rgba(255,255,255,0.07); border:1px solid var(--border); border-radius: 13px; padding:.85rem; }
    .ingredient-group h4 { font-family:'DM Mono', monospace; font-size:.95rem; color: var(--gold); margin:0 0 .6rem; }
    .ingredient-row { display:flex; justify-content:space-between; margin:.35rem 0; font-size:.95rem; }
    .ingredient-row span.amount { color: var(--gold); font-family:'DM Mono', monospace; font-weight:700; }

    .tip-grid { grid-template-columns: repeat(auto-fit, minmax(200px,1fr)); gap: .9rem; margin-top:1.1rem; }
    .tip-card { padding: .85rem; border-radius: 12px; border:1px solid var(--border); background: rgba(255,255,255,.05); text-align:left; }
    .tip-card h4 { margin:0 0 .35rem; font-size:1rem; color: #FFF; }
    .tip-card p { margin:0; color: var(--dimmer); font-size:.9rem; }

    .serving-grid { grid-template-columns: repeat(2,minmax(180px,1fr)); gap:.8rem; margin-top:1rem; }
    .serving-card { background: rgba(255,255,255,0.06); border: 1px solid var(--border); border-radius:12px; padding: .9rem; text-align:left; }
    .serving-card h4 { margin:.1rem 0 .5rem; font-family:'DM Mono', monospace; color: var(--gold); font-size:.91rem; }
    .serving-card ul { margin:0; padding-left: 1rem; color: #FEE8C5; font-size:.9rem; }
    .serving-card ul li { margin:.2rem 0; }

    .end-slide { margin-top: .2rem; }
    .end-slide .giant { font-family:'Cormorant Garamond', serif; font-size: 10rem; line-height:1; letter-spacing:-.03em; text-align:center; margin:0; background: linear-gradient(90deg,var(--ember),var(--gold),var(--bright)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .end-slide .sub { margin: .5rem 0; color: var(--dim); font-size:1.5rem; }
    .end-slide .credit { margin-top:.7rem; color: var(--dimmer); font-size:.92rem; }

    .controls { position:absolute; left:50%; bottom:1rem; transform:translateX(-50%); z-index:20; padding:.45rem .5rem; border-radius: 999px; background: rgba(6,4,2,0.62); border:1px solid var(--border); display:flex; align-items:center; gap:.5rem; backdrop-filter: blur(6px); }
    .controls button { border:none; border-radius:999px; background:rgba(255,255,255,.08); color: var(--bright); width: 46px; height:46px; cursor:pointer; font-size:1.25rem; }
    .dot-row { display:flex; gap:.3rem; margin:0 .5rem; }
    .dot { width:9px; height:9px; border-radius:50%; background: rgba(255,255,255,0.32); transition: all .25s ease; }
    .dot.active { width: 18px; background: var(--ember); }
    .slide-bin { font-family:'DM Mono', monospace; font-size:.79rem; color:var(--dimmer); margin-left:.4rem; }

    .arc-timer { position:absolute; right:1.2rem; bottom:1.3rem; width:56px; height:56px; z-index:20; display:flex; align-items:center; justify-content:center; }
    .arc-timer svg { transform:rotate(-90deg); width:44px; height:44px; }
    .arc-timer circle { fill: none; stroke-width:4; stroke-linecap: round; }
    .arc-track { stroke: rgba(255,255,255,0.14); }
    .arc-progress { stroke: var(--gold); stroke-dasharray: 276.46; stroke-dashoffset: 276.46; transition: stroke-dashoffset 0.2s linear; }
    .arc-label { position:absolute; color:#FFF; font-family:'DM Mono', monospace; font-size:.75rem; }

    #grain { position:fixed; inset:0; z-index:30; pointer-events:none; opacity:.038; }
    #particles { position:absolute; inset: 0; z-index: 7; pointer-events:none; }

    .custom-cursor-dot, .custom-cursor-ring { position: fixed; pointer-events: none; z-index: 40; border-radius:50%; transform:translate(-50%,-50%); mix-blend-mode: screen; }
    .custom-cursor-dot { width: 8px; height:8px; background: var(--ember); box-shadow:0 0 8px rgba(217,79,0,0.9); }
    .custom-cursor-ring { width: 28px; height: 28px; border: 1.5px solid var(--gold); opacity:.58; }

    .menu-overlay { position: absolute; inset:0; z-index: 22; display:none; justify-content:center; align-items:center; background: rgba(2,1,0,0.84); backdrop-filter: blur(8px); }
    .menu-overlay.active { display:flex; }
    .menu-panel { width: min(760px,90vw); max-height: 80vh; overflow:auto; border:1px solid var(--border); border-radius:16px; background: rgba(8,5,2,0.88); padding: 1rem; }
    .menu-panel h2 { margin:0 0 .75rem; font-family:'Cormorant Garamond',serif; font-size:1.5rem; }
    .menu-item { display:flex; align-items:center; justify-content:space-between; gap:.5rem; border-radius: 10px; padding:.6rem .7rem; margin:.25rem 0; cursor:pointer; border:1px solid transparent; transition:.2s; }
    .menu-item:hover { border-color: rgba(232,160,32,.5); background: rgba(232,160,32,0.08); }
    .menu-item.active { border-color: var(--ember); background: rgba(217,79,0,0.2); color: var(--bright); }

    .hidden { display:none !important; }

    @media(max-width: 768px) {
      #app { grid-template-columns: 74px 1fr; }
      .sidebar { width: 74px; padding: 0.8rem 0.45rem; }
      .brand, .category span, .recipe-list, .serves-control { display:none; }
      .sidebar { border-right:none; }
      .topbar { left: .5rem; right:.5rem; }
      .controls { bottom: 70px; }
      .arc-timer { right:.8rem; bottom:70px; }
      .welcome h1 { font-size: 4.7rem; }
      .welcome p { font-size: 1rem; }
    }
  </style>
</head>
<body>
  <div id="app">
    <aside class="sidebar" aria-label="Recipe navigation">
      <div class="brand">🍽️ The Kitchen<span>Restaurant recipes, step by step</span></div>
      <div id="categories"></div>
      <div class="serves-control">
        <h3>SERVES</h3>
        <div class="serves-row">
          <button id="serve-decrease" aria-label="Decrease servings">−</button>
          <div class="serves-value" id="serve-count">4</div>
          <button id="serve-increase" aria-label="Increase servings">+</button>
        </div>
        <div class="serves-note" id="serve-note">Scaled for 4 people</div>
      </div>
    </aside>
    <main class="main" id="main">
      <div class="topbar" id="topbar">
        <h1 id="header-title">The Kitchen</h1>
        <button id="steps-toggle" aria-label="Open steps overlay">☰ All Steps</button>
      </div>
      <div id="content"></div>
      <div id="particles"></div>
      <div class="controls" id="controls">
        <button id="prev-btn" aria-label="Previous slide">←</button>
        <button id="play-btn" aria-label="Play/Pause">⏸</button>
        <button id="next-btn" aria-label="Next slide">→</button>
        <div class="dot-row" id="dots"></div>
        <div class="slide-bin" id="slide-label">Welcome</div>
      </div>
      <div class="arc-timer" id="arc-timer">
        <svg viewBox="0 0 50 50"><circle class="arc-track" cx="25" cy="25" r="22"></circle><circle class="arc-progress" id="arc-progress" cx="25" cy="25" r="22"></circle></svg>
        <div class="arc-label" id="arc-text">0</div>
      </div>
      <div id="grain"><svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="3" stitchTiles="stitch" /><feColorMatrix type="saturate" values="0"/><feComponentTransfer><feFuncA type="linear" slope="0.11"/></feComponentTransfer></filter><rect width="100%" height="100%" filter="url(#noise)"></rect></svg></div>
      <div class="menu-overlay" id="menu-overlay" aria-hidden="true">
        <div class="menu-panel">
          <h2>Recipe Steps</h2>
          <div id="menu-items"></div>
        </div>
      </div>
      <div class="custom-cursor-dot" id="cursor-dot"></div>
      <div class="custom-cursor-ring" id="cursor-ring"></div>
    </main>
  </div>
  <script>
    const categories = [
      { id: 'indian-street-food', label: 'Indian Street Food', icon: '🛺' },
      { id: 'indian-curries', label: 'Indian Curries', icon: '🍛' },
      { id: 'indian-breads', label: 'Indian Breads', icon: '🫓' },
      { id: 'rice-dishes', label: 'Rice Dishes', icon: '🍚' },
      { id: 'soups-and-dals', label: 'Soups & Dals', icon: '🥣' },
      { id: 'desserts', label: 'Desserts', icon: '🍮' }
    ];

    const recipes = [
      {
        id: 'pav-bhaji', name: 'Pav Bhaji', category:'indian-street-food', cuisine:'Maharashtrian', time:'50 mins', baseServings:4,
        heroImage:'photo-1562967916-eb82221dfb27',
        ingredients:[
          {
            group:'🌶️ Bhaji Masala', items:[
              { name:'Butter', amount:4, unit:'tbsp' },
              { name:'Cumin seeds', amount:1, unit:'tsp' },
              { name:'Ginger-garlic paste', amount:2, unit:'tbsp' },
              { name:'Pav bhaji masala', amount:2, unit:'tbsp' },
              { name:'Red chilli powder', amount:1, unit:'tsp' }
            ]
          },
          {
            group:'🥕 Vegetables', items:[
              { name:'Potatoes', amount:500, unit:'g' },
              { name:'Cauliflower', amount:200, unit:'g' },
              { name:'Green peas', amount:150, unit:'g' },
              { name:'Carrot', amount:100, unit:'g' },
              { name:'Onions', amount:2, unit:'' },
              { name:'Tomatoes', amount:4, unit:'' },
              { name:'Bell pepper', amount:1, unit:'' }
            ]
          }
        ],
        steps:[
          { phase:'Phase 1 — Prep', title:'Chop and Parboil', body:'Dice onions, tomatoes, green pepper, and carrots. Boil potatoes, cauliflower and peas until fork tender.', timer:'10 mins · Medium heat', tip:'Uniform pieces ensure even mash and texture.', image:'photo-1568051243852-25f3f1b4f22f' },
          { phase:'Phase 2 — Aromatics', title:'Saute Onions', body:'Heat butter, add cumin seeds, then sauté onions until translucent. Add ginger-garlic paste and cook until fragrance rises.', timer:'5 mins · Low-medium', tip:'Don’t let the garlic brown; this keeps the gravy sweet.', image:'photo-1478145787956-f6f12c59624d' },
          { phase:'Phase 3 — Tomato Cook', title:'Add Tomatoes & Spices', body:'Add chopped tomatoes, green chilli, chilli powder and pav bhaji masala. Cook until tomatoes soften and oil clears.', timer:'7 mins · Medium', tip:'Stir frequently to avoid sticking at the bottom.', image:'photo-1551183053-bf91a1d81141' },
          { phase:'Phase 4 — Blend', title:'Mash a Spicy Mash', body:'Add boiled vegetables, mash with a potato masher. Add water to adjust consistency and simmer.', timer:'6 mins · Simmer', tip:'A slightly chunky texture is authentic and pleasing.', image:'photo-1504674900247-0877df9cc836' },
          { phase:'Phase 5 — Finish', title:'Finish with Butter', body:'Stir in remaining butter for shine, add lemon juice and chopped coriander leaf.', timer:'2 mins · Low', tip:'The final butter swipe gives pav bhaji its signature gloss.', image:'photo-1509042239860-f550ce710b93' },
          { phase:'Phase 6 — Toast Pav', title:'Toast the Buns', body:'Split pav buns, toast in butter until golden and crisp at edges.', timer:'4 mins · Medium', tip:'Butter-toast each side to lock in texture and flavor.', image:'photo-1543353071-087092ec3939' },
          { phase:'Phase 7 — Plate', title:'Serve with Sides', body:'Plate bhaji, top with extra butter and coriander; serve with toasted pav, onion rings and lemon wedges.', timer:'2 mins · Ready', tip:'It is best enjoyed straight off the skillet when piping hot.', image:'photo-1551218808-94e220e084d2' }
        ],
        tips:[
          { icon:'🧈', title:'Rich Butter Finish', body:'A final spoon of butter into the bhaji before serving adds silkiness.' },
          { icon:'🍋', title:'Acid Balance', body:'Lemon juice at end brightens and balances smoky spice.' },
          { icon:'🌿', title:'Fresh Coriander', body:'Use freshly chopped coriander for aroma and color.' },
          { icon:'🥣', title:'Right Consistency', body:'Aim for thick, spreadable consistency—not soup-like.' },
          { icon:'🔥', title:'Reheat Technique', body:'Reheat with a splash of water and simmer for 2 mins to revive texture.' }
        ],
        serving:{
          bread:['Butter toasted pav','Garlic pav','Schezuan pav'],
          rice:['Plain steamed rice (optional)','Jeera rice'],
          garnish:['Sliced onions','Lemon wedges','Cilantro sprigs'],
          storage:['Refrigerate 2 days in airtight','Reheat with a knob of butter','Do not freeze (texture changes)']
        }
      },
      {
        id:'kadai-paneer', name:'Kadai Paneer', category:'indian-curries', cuisine:'North Indian', time:'45 mins', baseServings:4,
        heroImage:'photo-1504674900247-0877df9cc836',
        ingredients:[
          {
            group:'🌶️ Kadai Masala', items:[
              { name:'Coriander seeds', amount:2, unit:'tbsp' },
              { name:'Cumin seeds', amount:2, unit:'tsp' },
              { name:'Fennel seeds', amount:2, unit:'tsp' },
              { name:'Dried red chilli', amount:4, unit:'' },
              { name:'Black pepper', amount:2, unit:'tsp' }
            ]
          },
          {
            group:'🧅 Sabzi', items:[
              { name:'Paneer, cubed', amount:250, unit:'g' },
              { name:'Onions', amount:2, unit:'' },
              { name:'Tomatoes', amount:4, unit:'' },
              { name:'Capsicum', amount:1, unit:'' },
              { name:'Ginger', amount:1, unit:'inch' },
              { name:'Garlic cloves', amount:5, unit:'' }
            ]
          }
        ],
        steps:[
          { phase:'Phase 1 — Spice Prep', title:'Toast & Grind Masala', body:'Dry roast coriander, cumin, fennel, red chilli, pepper until fragrant. Grind into coarse powder.', timer:'6 mins · Low', tip:'Cool fully before grinding to avoid paste.', image:'photo-1457053296964-5d54a9a82749' },
          { phase:'Phase 2 — Paneer Fry', title:'Lightly Sear Paneer', body:'Toss paneer cubes in oil and sear until light brown edges. Set aside.', timer:'5 mins · Medium', tip:'Avoid over-browning to keep soft center.', image:'photo-1604908177522-fcb4a47f12eb' },
          { phase:'Phase 3 — Base Sauce', title:'Cook Onions & Tomatoes', body:'Sauté onions until caramelized. Add ginger-garlic paste, then tomatoes; cook until oil separates.', timer:'10 mins · Medium', tip:'Slow-cooking tomatoes gives depth and sweetness.', image:'photo-1523986371872-9d3ba2e2f7d1' },
          { phase:'Phase 4 — Spice Addition', title:'Add Kadai Masala', body:'Stir in ground kadai masala, chilli powder, turmeric and salt, cook 2 minutes.', timer:'2 mins · Low', tip:'Bloom spices in oil for maximum flavor.', image:'photo-1540128635-b7ee348fcbf4' },
          { phase:'Phase 5 — Bell Pepper', title:'Capsicum Crunch', body:'Add diced capsicum and simmer for a quick bite, retaining crunch.', timer:'3 mins · Medium', tip:'Slightly crunchy peppers make texture interesting.', image:'photo-1595008211152-073c47f19918' },
          { phase:'Phase 6 — Combine', title:'Add Paneer & Finish', body:'Fold in seared paneer, simmer with cream and kasuri methi for 3 minutes.', timer:'3 mins · Low', tip:'Kasuri methi at end enhances aroma.', image:'photo-1608927011844-3abbf38229c4' },
          { phase:'Phase 7 — Garnish', title:'Garnish & Rest', body:'Sprinkle cilantro and a swirl of cream, rest covered for 2 minutes.', timer:'2 mins · Off heat', tip:'Letting rest helps flavors marry.', image:'photo-1525351484163-7529414344d8' }
        ],
        tips:[

    const state = {
      activeRecipe: null,
      slideIndex: 0,
      playing: true,
      serving: 4,
      slides: [],
      slideTimer: null,
      arcTimer: null,
      slideStart: 0,
      duration: 7000
    };

    const el = {
      categories: document.getElementById('categories'),
      serveCount: document.getElementById('serve-count'),
      serveNote: document.getElementById('serve-note'),
      content: document.getElementById('content'),
      topbarTitle: document.getElementById('header-title'),
      stepsToggle: document.getElementById('steps-toggle'),
      menuOverlay: document.getElementById('menu-overlay'),
      menuItems: document.getElementById('menu-items'),
      controls: document.getElementById('controls'),
      playBtn: document.getElementById('play-btn'),
      prevBtn: document.getElementById('prev-btn'),
      nextBtn: document.getElementById('next-btn'),
      dots: document.getElementById('dots'),
      slideLabel: document.getElementById('slide-label'),
      arcProgress: document.getElementById('arc-progress'),
      arcText: document.getElementById('arc-text'),
      particles: document.getElementById('particles'),
      cursorDot: document.getElementById('cursor-dot'),
      cursorRing: document.getElementById('cursor-ring')
    };

    function unsplash(id){ return `https://images.unsplash.com/${id}?w=1400&q=80&fit=crop&auto=format`; }

    function toFraction(n){
      const whole = Math.floor(n);
      const rem = n - whole;
      let frac='';
      if(rem < 0.10) frac='';
      else if(rem < 0.30) frac='¼';
      else if(rem < 0.45) frac='⅓';
      else if(rem < 0.60) frac='½';
      else if(rem < 0.70) frac='⅔';
      else if(rem < 0.90) frac='¾';
      else frac='1';
      if(whole===0) return frac || '¼';
      return frac ? `${whole}${frac}` : `${whole}`;
    }

    function scaleAmount(base, baseServings, currentServings){
      const scaled = (base/baseServings)*currentServings;
      if(typeof base==='number') return toFraction(scaled);
      return base;
    }

    function renderCategories(){
      el.categories.innerHTML='';
      categories.forEach(cat => {
        const catEl=document.createElement('div');
        catEl.className='category';
        if(state.activeRecipe && state.activeRecipe.category===cat.id){catEl.classList.add('active');}
        catEl.innerHTML=`<span class="caption">${cat.icon} ${cat.label}</span><span>${state.activeRecipe && state.activeRecipe.category===cat.id?'▼':'▶'}</span>`;
        catEl.addEventListener('click',()=>{
          if(state.activeRecipe && state.activeRecipe.category===cat.id){
            state.activeRecipe=null; render();
          } else {
            const next = recipes.find(r=>r.category===cat.id);
            if(next) selectRecipe(next.id);
          }
        });
        el.categories.appendChild(catEl);

        const list = document.createElement('div');
        list.className='recipe-list';
        list.style.maxHeight = state.activeRecipe && state.activeRecipe.category===cat.id ? '360px' : '0';

        recipes.filter(r=>r.category===cat.id).forEach(recipe=>{
          const item=document.createElement('div');
          item.className='recipe-item';
          if(state.activeRecipe && state.activeRecipe.id===recipe.id){item.classList.add('active');}
          item.textContent=recipe.name;
          item.addEventListener('click',()=>selectRecipe(recipe.id));
          list.appendChild(item);
        });

        el.categories.appendChild(list);
      });
    }

    function buildSlides(recipe){
      const result=[];
      const totalSteps = recipe.steps.length;
      const ingredientSlide = {
        type:'ingredients',
        title:'The Ingredients',
        eyebrow:'What You Need',
        groups: recipe.ingredients,
        tip: 'Tip: Adjust salt and spice to taste after scaling.'
      };
      result.push({type:'intro', eyebrow:recipe.cuisine, title:recipe.name, subtitle:`${recipe.time} · Serves ${recipe.baseServings} · ${totalSteps} steps`, stats:[recipe.time, `${recipe.baseServings} servings`, `${totalSteps} steps`], image:recipe.heroImage});
      result.push(ingredientSlide);

      recipe.steps.forEach((step,index)=>{
        result.push({
          type:'step',
          phase: step.phase,
          stepNum: index+1,
          total:totalSteps,
          title: step.title,
          body: step.body,
          timer: step.timer,
          tip: step.tip,
          image: step.image
        });
      });

      result.push({type:'tips', title:'Chef Tips', tips: recipe.tips, image: recipe.heroImage});
      result.push({type:'serving', title:'Serving Suggestions', serving: recipe.serving, image: recipe.heroImage});
      result.push({type:'end', title:'Enjoy', subtitle:`${recipe.name} is ready`, credit:`Recipe by Hebbar's Kitchen · Presented by The Kitchen App`, image:recipe.heroImage});

      return result;
    }

    function renderSlide(){
      if(!state.activeRecipe){ renderWelcome(); return; }
      const slide = state.slides[state.slideIndex];
      const bgImage = slide.image ? unsplash(slide.image) : unsplash(state.activeRecipe.heroImage);
      el.content.innerHTML = `
        <div class="slide-container" id="slide-container">
          <div class="slide-bg kenburns" style="background-image:url('${bgImage}')"></div>
          <div class="slide-content" aria-live="polite">${renderSlideContent(slide)}</div>
        </div>`;
      renderDots();
      el.slideLabel.textContent = slideLabel(slide);
      generateParticles();
      state.slideStart = performance.now();
      resetArc();
      restartTimer();
      renderStepMenu();
    }

    function renderSlideContent(slide){
      if(slide.type==='intro'){
        return `<h2>${slide.eyebrow}</h2><h3>${slide.title}</h3><p class="subtitle">${slide.subtitle}</p><div class="stats">${slide.stats.map(s=>`<div class="badge">${s}</div>`).join('')}</div>`;
      }
      if(slide.type==='ingredients'){
        return `<h2>${slide.eyebrow}</h2><h3>${slide.title}</h3><div class="ingredients-grid">${slide.groups.map(group=>`<div class="ingredient-group"><h4>${group.group}</h4>${group.items.map(item=>`<div class="ingredient-row"><span>${item.name}</span><span class="amount">${scaleAmount(item.amount,state.activeRecipe.baseServings,state.serving)} ${item.unit}</span></div>`).join('')}</div>`).join('')}</div><div class="tip-box"><p>Tip: ${slide.tip}</p></div>`;
      }
      if(slide.type==='step'){
        return `<h2>${slide.phase}</h2><div style="display:flex;align-items:center;justify-content:center;gap:.7rem;margin-top:.4rem;"><div class="step-badge">${slide.stepNum}</div><div class="badge">of ${slide.total} steps</div></div><h3>${slide.title}</h3><p class="step-body">${slide.body}</p>${slide.timer?`<div class="timer-pill">${slide.timer}</div>`:''}${slide.tip?`<div class="tip-box"><p>${slide.tip}</p></div>`:''}`;
      }
      if(slide.type==='tips'){
        return `<h2>Chef Tips</h2><h3>Kitchen wisdom for better results</h3><div class="tip-grid">${slide.tips.map(t=>`<div class="tip-card"><h4>${t.icon} ${t.title}</h4><p>${t.body}</p></div>`).join('')}</div>`;
      }
      if(slide.type==='serving'){
        return `<h2>Serving Slide</h2><h3>More ways to enjoy</h3><div class="serving-grid">${Object.entries(slide.serving).map(([key,arr])=>`<div class="serving-card"><h4>${key.charAt(0).toUpperCase()+key.slice(1)}</h4><ul>${arr.map(i=>`<li>${i}</li>`).join('')}</ul></div>`).join('')}</div>`;
      }
      if(slide.type==='end'){
        return `<div class="end-slide"><div class="giant">${slide.title}</div><div class="sub">${slide.subtitle}</div><div class="credit">${slide.credit}</div></div>`;
      }
      return '';
    }

    function slideLabel(slide){
      if(slide.type==='intro') return 'Intro';
      if(slide.type==='ingredients') return 'Ingredients';
      if(slide.type==='step') return `${slide.phase}`;
      if(slide.type==='tips') return 'Chef Tips';
      if(slide.type==='serving') return 'Serving';
      if(slide.type==='end') return 'Finish';
      return '';
    }

    function renderDots(){
      el.dots.innerHTML='';
      state.slides.forEach((_,i)=>{
        const dot=document.createElement('div'); dot.className='dot';
        if(i===state.slideIndex) dot.classList.add('active');
        dot.addEventListener('click',()=>{state.slideIndex=i; renderSlide();});
        el.dots.appendChild(dot);
      });
    }

    function renderWelcome(){
      el.topbarTitle.textContent='The Kitchen';
      el.content.innerHTML = `
      <section class="welcome" aria-live="polite">
        <h1>The Kitchen</h1>
        <p>Select a recipe from the sidebar to begin</p>
        <div class="cat-grid">${categories.map(cat=>`<button class="cat-button" data-cat="${cat.id}">${cat.icon} ${cat.label}</button>`).join('')}</div>
      </section>`;
      document.querySelectorAll('.cat-button').forEach(btn=>{
        btn.addEventListener('click',()=>{const cat=btn.dataset.cat; const first=recipes.find(r=>r.category===cat); if(first) selectRecipe(first.id); });
      });
      renderDots();
      el.slideLabel.textContent='Welcome';
      clearTimers();
      state.playing=false; updatePlayState();
    }

    function selectRecipe(id){
      state.activeRecipe = recipes.find(r=>r.id===id);
      state.slides = buildSlides(state.activeRecipe);
      state.slideIndex =0;
      state.playing=true;
      renderCategories();
      render();
    }

    function renderStepMenu(){
      el.menuItems.innerHTML = state.slides.map((slide,index)=>{
        const label = slide.type==='step' ? `${slide.stepNum}. ${slide.title}` : slide.type==='intro' ? '0. Intro' : slide.type==='ingredients' ? '1. Ingredients' : slide.type==='tips' ? 'Tips' : slide.type==='serving' ? 'Serving' : 'Enjoy';
        return `<div class="menu-item ${index===state.slideIndex?'active':''}" data-index="${index}"><span>${label}</span><span>${slideLabel(slide)}</span></div>`;
      }).join('');
      el.menuItems.querySelectorAll('.menu-item').forEach(item=>{
        item.addEventListener('click',()=>{state.slideIndex = Number(item.dataset.index); el.menuOverlay.classList.remove('active'); renderSlide();});
      });
    }

    function startTimer(){ clearTimers(); state.slideTimer = setInterval(()=>{ nextSlide(); }, state.duration); state.arcTimer = requestAnimationFrame(updateArc); }

    function restartTimer(){ clearTimers(); if(state.playing){ state.slideTimer = setTimeout(()=>{ nextSlide(); }, state.duration); state.arcTimer = requestAnimationFrame(updateArc); } }

    function clearTimers(){ if(state.slideTimer){ clearTimeout(state.slideTimer); state.slideTimer=null; } if(state.arcTimer){ cancelAnimationFrame(state.arcTimer); state.arcTimer=null; } }

    function resetArc(){ el.arcProgress.style.strokeDashoffset='276.46'; if(state.arcText){ el.arcText.textContent = Math.ceil(state.duration/1000); }}

    function updateArc(){
      if(!state.activeRecipe) return;
      const ellapsed = performance.now() - state.slideStart;
      const remain = Math.max(0, state.duration - ellapsed);
      const pct = remain / state.duration;
      el.arcProgress.style.strokeDashoffset = (276.46 * pct).toFixed(2);
      el.arcText.textContent = String(Math.ceil(remain/1000));
      if(remain<=0){ return; }
      state.arcTimer = requestAnimationFrame(updateArc);
    }

    function togglePlay(){ state.playing=!state.playing; if(state.playing){ restartTimer(); } else { clearTimers(); } updatePlayState(); }
    function updatePlayState(){ el.playBtn.textContent = state.playing? '⏸':'▶'; }

    function prevSlide(){
      if(!state.activeRecipe) return;
      state.slideIndex = (state.slideIndex-1+state.slides.length)%state.slides.length;
      renderSlide();
    }
    function nextSlide(){
      if(!state.activeRecipe) return;
      state.slideIndex = (state.slideIndex+1) % state.slides.length;
      renderSlide();
    }

    function generateParticles(){ el.particles.innerHTML='';
      for(let i=0;i<20;i++){ const p=document.createElement('span'); const size= Math.random()*6+2; p.style.width = `${size}px`; p.style.height = `${size}px`; p.style.position='absolute'; p.style.left = `${Math.random()*100}%`; p.style.bottom='-20px'; p.style.background = `hsla(${Math.random()*50+20}, 100%, 70%, ${Math.random()*0.45+0.15})`; p.style.borderRadius='50%'; p.style.filter='blur(0.5px)'; p.style.animation = `rise ${Math.random()*8+6}s linear forwards`; p.style.opacity = `${Math.random()*0.7+0.2}`; p.style.animationDelay=`${Math.random()*1.2}s`; el.particles.appendChild(p); }
    }
    const styleEl = document.createElement('style'); styleEl.textContent = `@keyframes rise {0%{transform:translateY(0) translateX(0)}100%{transform:translateY(-120vh) translateX(${Math.random()*40-20}px);} }`; document.head.appendChild(styleEl);

    function handleKeyboard(event){ if(event.target.tagName==='INPUT' || event.target.tagName==='TEXTAREA') return;
      const key = event.key.toLowerCase();
      if(key==='arrowright' || key===' '){ nextSlide(); }
      if(key==='arrowleft'){ prevSlide(); }
      if(key==='p'){ togglePlay(); }
      if(key==='m'){ el.menuOverlay.classList.toggle('active'); }
      if(key==='escape'){ el.menuOverlay.classList.remove('active'); }
    }

    function handleClickZone(event){
      const slideArea = event.currentTarget; if(event.target.closest('.controls')||event.target.closest('.menu-overlay')) return;
      const rect = slideArea.getBoundingClientRect();
      if(event.clientX - rect.left < rect.width/2) prevSlide(); else nextSlide();
    }

    function handleCursorMove(e){ el.cursorDot.style.left=`${e.clientX}px`; el.cursorDot.style.top=`${e.clientY}px`; el.cursorRing.style.left=`${e.clientX}px`; el.cursorRing.style.top=`${e.clientY}px`; }

    function updateServing(diff){ state.serving = Math.max(1, Math.min(20, state.serving + diff)); el.serveCount.textContent=state.serving; el.serveNote.textContent=`Scaled for ${state.serving} people`; if(state.activeRecipe) renderSlide(); }

    function render(){
      renderCategories();
      el.topbarTitle.textContent = state.activeRecipe ? state.activeRecipe.name : 'The Kitchen';
      if(state.activeRecipe){ renderSlide(); } else { renderWelcome(); }
      updatePlayState();
    }

    el.stepsToggle.addEventListener('click',()=>{ el.menuOverlay.classList.toggle('active'); });
    el.menuOverlay.addEventListener('click',(e)=>{ if(e.target===el.menuOverlay){ el.menuOverlay.classList.remove('active'); }});
    el.prevBtn.addEventListener('click',(e)=>{ e.stopPropagation(); prevSlide(); });
    el.nextBtn.addEventListener('click',(e)=>{ e.stopPropagation(); nextSlide(); });
    el.playBtn.addEventListener('click',(e)=>{ e.stopPropagation(); togglePlay(); });
    document.getElementById('serve-decrease').addEventListener('click',()=>updateServing(-1));
    document.getElementById('serve-increase').addEventListener('click',()=>updateServing(1));

    document.addEventListener('keydown',handleKeyboard);
    el.content.addEventListener('click',handleClickZone);
    window.addEventListener('mousemove',handleCursorMove);

    // initial
    render();

  </script>
</body>
</html>
